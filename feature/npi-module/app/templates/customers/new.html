{% extends "base.html" %}
{% block title %}新增客戶{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:800px">
  <h4 class="mb-3"><i class="bi bi-person-plus me-2 text-primary"></i>新增客戶（手動）</h4>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" action="/customers/new">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">客戶名稱 <span class="text-danger">*</span></label>
            <input name="name" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">事業部</label>
            <select name="bu" class="form-select">
              <option value="">—</option>
              <option value="儲能事業部">儲能事業部</option>
              <option value="消費性事業部">消費性事業部</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">聯絡人</label>
            <input name="contact" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label">電話</label>
            <input name="phone" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">地址</label>
            <input name="address" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label">統一編號</label>
            <input name="tax_id" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">備註</label>
            <textarea name="memo" rows="2" class="form-control"></textarea>
          </div>
        </div>
        <div class="mt-3 d-flex justify-content-end gap-2">
          <a href="/customers/" class="btn btn-outline-secondary">取消</a>
          <button class="btn btn-primary">儲存</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
